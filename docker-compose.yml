version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: dr-lab-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tododb
      MYSQL_USER: labuser
      MYSQL_PASSWORD: labpassword
    ports:
      - "3306:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 5s

  app:
    build: .
    container_name: dr-lab-app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_USER: labuser
      DB_PASSWORD: labpassword
      DB_NAME: tododb
      NODE_ENV: development
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm start

volumes:
  mysql_data:

networks:
  default:
    name: dr-lab-network
